spring:
  application:
    name: biblione-auth-service
  cloud:
    vault:
      enabled: true
      host: vault
      port: 8200
      scheme: http
      authentication: TOKEN
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: biblione
        application-name: auth-service

  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${oauth_google_client_id}
            client-secret: ${oauth_google_client_secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

biblione:
  jwt:
    secret: ${jwt_secret}
    expiration-ms: ${jwt_expiration_ms}
    refresh-expiration-ms: ${jwt_refresh_expiration_ms}
  auth:
    allowed-email-domain: ${allowed_email_domain}

server:
  port: 8081
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized